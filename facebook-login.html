<!DOCTYPE html>
<html>

<head>

<title>Facebook Login</title>

<link rel="stylesheet" href="Stylefb.css">

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="fb-body">

<div class="container">

<div class="row align-items-center vh-100">

<!-- Left Side -->
<div class="col-md-6">

<h1 class="fb-logo">facebook</h1>

<p class="fb-text">
Facebook helps you connect and share with the people in your life.
</p>

</div>

<!-- Right Side -->
<div class="col-md-4">

<div class="card p-4 shadow">

<input type="text" class="form-control mb-3" placeholder="Email address or phone number">

<input type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-primary w-100 mb-2">Log In</button>

<a href="#" class="text-center d-block mb-3">Forgotten password?</a>

<hr>

<button class="btn btn-success w-100">Create New Account</button>

</div>

</div>

</div>

</div>

</body>
</html>
